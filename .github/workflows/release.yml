name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Embed OAuth credentials
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          cat > src/credentials.ts <<EOF
          export const GOOGLE_CLIENT_ID = '${GOOGLE_CLIENT_ID}';
          export const GOOGLE_CLIENT_SECRET = '${GOOGLE_CLIENT_SECRET}';
          EOF

      - name: Stamp version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '${VERSION}';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Build
        run: npm run build

      - name: Read binary versions
        id: versions
        run: |
          PANDOC_VERSION=$(node -e "console.log(require('./versions.json').pandoc)")
          echo "pandoc=${PANDOC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download pandoc binaries
        run: |
          mkdir -p bin
          PANDOC_VERSION="${{ steps.versions.outputs.pandoc }}"

          # arm64
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-arm64-macOS.zip" \
            -o /tmp/pandoc-arm64.zip
          unzip -j /tmp/pandoc-arm64.zip "pandoc-${PANDOC_VERSION}-arm64/bin/pandoc" -d /tmp/pandoc-arm64
          mv /tmp/pandoc-arm64/pandoc bin/pandoc-arm64
          chmod +x bin/pandoc-arm64

          # x86_64
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-x86_64-macOS.zip" \
            -o /tmp/pandoc-x86_64.zip
          unzip -j /tmp/pandoc-x86_64.zip "pandoc-${PANDOC_VERSION}-x86_64/bin/pandoc" -d /tmp/pandoc-x86_64
          mv /tmp/pandoc-x86_64/pandoc bin/pandoc-x86_64
          chmod +x bin/pandoc-x86_64

      - name: Package .mcpb
        run: npx @anthropic-ai/mcpb pack

      - name: Smoke test bundled pandoc
        run: |
          ./bin/pandoc-arm64 --version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: '*.mcpb'
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (production only)
        run: npm ci --omit=dev

      - name: Embed OAuth credentials
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          cat > src/credentials.ts <<EOF
          export const GOOGLE_CLIENT_ID = '${GOOGLE_CLIENT_ID}';
          export const GOOGLE_CLIENT_SECRET = '${GOOGLE_CLIENT_SECRET}';
          EOF

      - name: Build
        run: npx tsc  # tsc is a devDep so call it via npx from the full install

      - name: Read binary versions
        id: versions
        run: |
          PANDOC_VERSION=$(node -e "console.log(require('./versions.json').pandoc)")
          echo "pandoc=${PANDOC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download pandoc binaries
        run: |
          mkdir -p bin
          PANDOC_VERSION="${{ steps.versions.outputs.pandoc }}"

          # arm64
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-arm64-macOS.zip" \
            -o /tmp/pandoc-arm64.zip
          unzip -j /tmp/pandoc-arm64.zip "pandoc-${PANDOC_VERSION}/bin/pandoc" -d /tmp/pandoc-arm64
          mv /tmp/pandoc-arm64/pandoc bin/pandoc-arm64
          chmod +x bin/pandoc-arm64

          # x86_64
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-x86_64-macOS.zip" \
            -o /tmp/pandoc-x86_64.zip
          unzip -j /tmp/pandoc-x86_64.zip "pandoc-${PANDOC_VERSION}/bin/pandoc" -d /tmp/pandoc-x86_64
          mv /tmp/pandoc-x86_64/pandoc bin/pandoc-x86_64
          chmod +x bin/pandoc-x86_64

      - name: Reinstall with devDependencies for mcpb
        run: npm ci

      - name: Package .mcpb
        run: npx @anthropic-ai/mcpb pack

      - name: Smoke test bundled pandoc
        run: |
          ./bin/pandoc-arm64 --version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.mcpb'
          generate_release_notes: true
